<body>
<div class="shell">
  <header class="topbar">
    <button class="brand" data-action="go-today" aria-label="Life Admin home"><span class="brand-mark">L/O</span><span>Life Admin<small>Calm command centre</small></span></button>
    <form class="capture" id="global-capture"><label class="sr-only" for="global-input">Quick capture</label><input id="global-input" autocomplete="off" placeholder="Capture anything — task, reminder, thought…"><span>/</span><button aria-label="Add captured task">+</button></form>
    <div class="top-actions"><span class="date-chip" id="top-date"></span><button class="icon-btn" data-action="cycle-theme" aria-label="Change colour theme">◐</button><button class="icon-btn" data-action="open-settings" aria-label="Open settings">⚙</button></div>
  </header>

function merge(base,saved){if(Array.isArray(base))return Array.isArray(saved)?saved:clone(base);if(base&&typeof base==="object"){const o={};Object.keys(base).forEach(k=>o[k]=merge(base[k],saved?.[k]));if(saved&&typeof saved==="object")Object.keys(saved).forEach(k=>{if(!(k in o))o[k]=saved[k]});return o}return saved===undefined?base:saved}

}
function timelineHtml(rows){const now=nowMinutes();let active=rows.findIndex(x=>mins(x.time)>=now-10);if(active<0)active=rows.length-1;return rows.map((r,i)=>`<div class="time-row ${i===active?"now":""}"><div class="time">${esc(r.time)}</div><div class="rail"><div class="dot"></div></div><div><div class="event-title">${esc(r.name)}</div><div class="event-meta">${esc(r.meta)} ${r.owner?`<span class="pill ${r.owner==="You"?"me":"blue"}">${esc(r.owner)}</span>`:""}</div></div></div>`).join("")}

function planView(){
  const mon=D.monday(UI.date),days=Array.from({length:7},(_,i)=>D.add(mon,i)),sel=UI.date,rows=schedule(sel),mine=custody(sel),pressure=rows.filter(r=>r.owner==="You"&&mins(r.time)>=16*60&&mins(r.time)<=21*60);

  if(m==="kids"){const days=Array.from({length:14},(_,i)=>D.add(D.today(),i)),events=days.flatMap(date=>dayEvents(date).filter(e=>e.who&&e.who!=="You").map(e=>({...e,date})));return drawerHead("🧒","Kids & custody","The fortnight, without the mental arithmetic.")+`<div class="signal-grid"><div class="signal"><small>Tonight</small><strong>${custody(D.today())?"With you":"Tracey"}</strong></div><div class="signal"><small>Week</small><strong>${Math.abs(Math.floor(D.diff(D.monday(D.today()),S.custodyAnchor)/7))%2?"B":"A"}</strong></div></div><div class="detail-section"><h3>Next 14 days</h3><div class="history">${events.map(e=>`<div class="history-row"><span><strong>${esc(e.who)} · ${esc(e.name)}</strong><br><small>${D.short(e.date)} · ${esc(e.time)}</small></span><span>${esc(e.owner)}</span></div>`).join("")}</div></div>`}
  if(m==="home")return drawerHead("⌂","Home","Bounded effort, visible closure.")+`<div class="signal-grid"><div class="signal"><small>This week</small><strong>${weekResets()}</strong><span>resets</span></div><div class="signal"><small>Last reset</small><strong>${S.resets.at(-1)?S.resets.at(-1).mins+"m":"—"}</strong><span>${S.resets.at(-1)?D.short(S.resets.at(-1).date):"not logged"}</span></div></div><div class="detail-section"><button class="btn accent" style="width:100%" data-action="start-reset">Start tonight’s guided reset</button></div><div class="detail-section"><h3>Next best few</h3>${["Bathroom surfaces","Fresh sheets","Fridge shelf check"].map(x=>`<div class="history-row"><span>${x}</span><span>Mark done</span></div>`).join("")}</div>`
  if(m==="health"){const bp=S.health.bp.at(-1),wt=S.health.weight.at(-1);return drawerHead("♡","Health","Useful records, no medical theatre.")+`<div class="signal-grid"><div class="signal"><small>Latest BP</small><strong>${bp?bp.sys+"/"+bp.dia:"—"}</strong><span>${bp?D.short(bp.date):"not logged"}</span></div><div class="signal"><small>Latest weight</small><strong>${wt?wt.kg+" kg":"—"}</strong><span>${wt?D.short(wt.date):"not logged"}</span></div></div><form id="health-form" class="detail-section"><h3>Log today</h3><div class="form-grid"><div class="field"><label>Systolic</label><input name="sys" type="number" inputmode="numeric" placeholder="120"></div><div class="field"><label>Diastolic</label><input name="dia" type="number" inputmode="numeric" placeholder="80"></div><div class="field"><label>Pulse</label><input name="pulse" type="number" inputmode="numeric" placeholder="Optional"></div><div class="field"><label>Weight (kg)</label><input name="kg" type="number" inputmode="decimal" step="0.1" placeholder="Optional"></div></div><button class="btn primary" style="margin-top:12px">Save readings</button></form><div class="detail-section"><h3>Recent</h3><div class="history">${S.health.bp.slice(-5).reverse().map(x=>`<div class="history-row"><span>${D.short(x.date)}</span><span>${x.sys}/${x.dia}${x.pulse?" · "+x.pulse:""}</span></div>`).join("")||'<div class="empty">No readings logged yet.</div>'}</div></div>`}
  if(m==="movement")return drawerHead("↗","Movement","Consistency with room for real life.")+`<div class="signal-grid"><div class="signal"><small>This week</small><strong>${weekGym()}</strong><span>sessions</span></div><div class="signal"><small>Next</small><strong>${["Push","Pull","Legs"][S.gym.length%3]}</strong><span>suggested</span></div></div><div class="detail-section"><h3>Log a session</h3><div class="btn-row"><button class="btn accent" data-action="gym-log" data-mode="Full">Full session</button><button class="btn ghost" data-action="gym-log" data-mode="Short">Short counts</button><button class="btn ghost" data-action="gym-log" data-mode="Recovery">Recovery</button></div></div><div class="detail-section"><h3>Recent</h3>${S.gym.slice(-6).reverse().map(x=>`<div class="history-row"><span>${D.short(x.date)}</span><span>${esc(x.mode)} · ${esc(x.type)}</span></div>`).join("")||'<div class="empty">Start with the session you can do.</div>'}</div>`
  if(m==="money")return drawerHead("$","Money","Reassurance, not a finance dashboard.")+`<div class="signal-grid"><div class="signal"><small>Rhythm</small><strong>Fortnightly</strong><span>Wednesday</span></div><div class="signal"><small>Status</small><strong>${isPayWeek()?"Check":"Quiet"}</strong><span>${isPayWeek()?"pay flow":"nothing needed"}</span></div></div><div class="detail-section"><h3>Pay-day check</h3><div class="checklist">${["Pay has landed","Automatic transfers ran","Balance looks expected","Note anything unusual"].map((x,i)=>checkHtml(D.today(),"pay"+i,x)).join("")}</div></div>`
  return drawerHead("◌","Mind & practice","A private landing place for the inner weather.")+`<form id="reflection-form"><div class="field"><label>What felt heavy today?</label><textarea name="text" placeholder="A sentence is enough."></textarea></div><div class="field" style="margin-top:10px"><label>What is actually in your control?</label><input name="control" placeholder="One small thing"></div><button class="btn primary" style="margin-top:12px">Save reflection</button></form><div class="detail-section"><h3>Recent notes</h3>${S.reflections.slice(-5).reverse().map(x=>`<div class="history-row"><span>${D.short(x.date)}<br><small>${esc(x.text)}</small></span><span>${esc(x.control)}</span></div>`).join("")||'<div class="empty">Nothing written here yet.</div>'}</div>`
}
function openModal(html,label){UI.returnFocus=document.activeElement;const m=$("#modal");m.innerHTML=html;m.setAttribute("aria-label",label);m.classList.add("show");m.setAttribute("aria-hidden","false");$("#modal-back").classList.add("show");document.body.style.overflow="hidden";requestAnimationFrame(()=>m.querySelector("input,button")?.focus())}
function closeModal(){const m=$("#modal");m.classList.remove("show");m.setAttribute("aria-hidden","true");$("#modal-back").classList.remove("show");document.body.style.overflow="";if(UI.returnFocus?.isConnected)UI.returnFocus.focus()}
function captureModal(){openModal(`<div class="modal-head"><div><h2>Quick plan</h2><p>Add a dated commitment without losing your place.</p></div><button class="modal-close" data-action="close-modal">×</button></div><form id="event-form"><div class="field"><label>What is happening?</label><input name="title" required autofocus placeholder="e.g. Dentist, school meeting, dinner"></div><div class="form-grid" style="margin-top:10px"><div class="field"><label>Date</label><input name="date" type="date" value="${UI.date}"></div><div class="field"><label>Time</label><input name="time" type="time"></div></div><div class="field" style="margin-top:10px"><label>Useful note</label><input name="note" placeholder="Location, leave time, what to bring"></div><div class="modal-actions"><button type="button" class="btn ghost" data-action="close-modal">Cancel</button><button class="btn primary">Add to plan</button></div></form>`,"Add event")}
function settingsModal(){openModal(`<div class="modal-head"><div><h2>Settings & data</h2><p>Appearance, migration and private on-device backups.</p></div><button class="modal-close" data-action="close-modal">×</button></div><div class="detail-section"><h3>Appearance</h3><div class="btn-row"><button class="btn ghost" data-action="set-theme" data-theme="light">Light</button><button class="btn ghost" data-action="set-theme" data-theme="dark">Dark</button><button class="btn ghost" data-action="set-theme" data-theme="system">System</button></div></div><div class="detail-section"><h3>Bring your previous data across</h3><p class="lede">Copies tasks, events, resets, training and health logs from <code>la_v1</code> when available. It never changes the old store. “Restore backup” also accepts an export from the previous app.</p><button class="btn primary" data-action="legacy-import" style="margin-top:10px">Import previous Life Admin data</button></div><div class="detail-section"><h3>Backup</h3><div class="btn-row"><button class="btn ghost" data-action="export-new">Download backup</button><button class="btn ghost" data-action="import-new">Restore backup</button><button class="btn danger" data-action="reset-new">Reset this app</button></div></div><div class="modal-actions"><button class="btn primary" data-action="close-modal">Done</button></div>`,"Settings and data")}
function applyTheme(){const t=S.theme==="system"?(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light"):S.theme;document.documentElement.dataset.theme=t;document.querySelector('meta[name="theme-color"]').content=t==="dark"?"#101614":"#f3f0e9"}
function startReset(){closeDrawer();const mine=custody(D.today()),zones=mine?[{name:"Kitchen landing",mins:7,tasks:["Dishes moving","Bench clear","Lunch gear together"]},{name:"Living zone",mins:6,tasks:["Floor pickup","Couch reset","Tomorrow items by door"]},{name:"Bathroom & close",mins:7,tasks:["Quick surfaces","Bins check","Lights down"]}]:[{name:"Kitchen close",mins:6,tasks:["Dishes moving","Bench clear","Coffee setup"]},{name:"Whole-house sweep",mins:6,tasks:["Pickup pass","Laundry moving","Doors and bins"]},{name:"Tomorrow",mins:3,tasks:["First commitment checked","Phone charging away from bed"]}];UI.timer={zones,index:0,total:zones.reduce((n,z)=>n+z.mins,0)*60,left:zones.reduce((n,z)=>n+z.mins,0)*60,done:new Set(),running:true};$("#focus-back").classList.add("show");document.body.style.overflow="hidden";renderTimer();clearInterval(UI.timer.tick);UI.timer.tick=setInterval(()=>{if(!UI.timer?.running)return;UI.timer.left--;if(UI.timer.left<=0)finishReset();else renderTimer()},1000)}
function renderTimer(){const t=UI.timer,z=t.zones[t.index],used=t.total-t.left,p=Math.round(used/t.total*100),mm=Math.floor(t.left/60),ss=String(t.left%60).padStart(2,"0");$("#focus-card").innerHTML=`<div class="focus-top"><div><div class="focus-label">Guided reset · zone ${t.index+1} of ${t.zones.length}</div><h2>${esc(z.name)}</h2></div><button class="btn ghost small" data-action="stop-reset">End</button></div><div class="timer">${mm}:${ss}</div><div class="progress" role="progressbar" aria-valuenow="${p}" aria-valuemin="0" aria-valuemax="100"><div style="width:${p}%"></div></div><div class="focus-tasks">${z.tasks.map((x,i)=>`<button class="focus-task ${t.done.has(t.index+":"+i)?"done":""}" data-action="timer-task" data-key="${t.index}:${i}">${t.done.has(t.index+":"+i)?"✓ ":""}${esc(x)}</button>`).join("")}</div><div class="btn-row"><button class="btn primary" data-action="next-zone">${t.index===t.zones.length-1?"Finish reset":"Zone done →"}</button><button class="btn ghost" data-action="add-time">+2 minutes</button></div>`}
function finishReset(){if(!UI.timer)return;clearInterval(UI.timer.tick);const minsUsed=Math.max(1,Math.round((UI.timer.total-UI.timer.left)/60));S.resets.push({date:D.today(),mins:minsUsed,zones:UI.timer.index+1});save("Reset complete. Leave the rest.");UI.timer=null;$("#focus-back").classList.remove("show");document.body.style.overflow="";render()}
function stopReset(){if(!UI.timer)return;clearInterval(UI.timer.tick);UI.timer=null;$("#focus-back").classList.remove("show");document.body.style.overflow="";toast("Reset ended. What got done counts.")}
function download(name,text){const b=new Blob([text],{type:"application/json"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),800)}
function fromLegacy(old){const n=clone(DEFAULT);n.tasks=Array.isArray(old.tasks)?old.tasks.map(t=>({id:t.id||uid(),title:t.text||t.title||"Untitled task",area:({school:"Kids",personal:"Personal",calls:"Admin",follow:"Work",wait:"Waiting",inbox:"Inbox"}[t.cat]||t.cat||"Inbox"),status:t.done?"done":t.cat==="wait"?"waiting":"open",top:!!t.top&&!t.done,created:t.created||D.today(),done:t.doneDate||null})):n.tasks;n.events=Array.isArray(old.events)?old.events.map(e=>({id:e.id||uid(),date:e.date,time:e.time,title:e.title,note:e.note||""})):n.events;if(old.settings?.custodyAnchor)n.custodyAnchor=old.settings.custodyAnchor;if(Array.isArray(old.settings?.terms))n.terms=old.settings.terms;if(Array.isArray(old.resets))n.resets=old.resets.map(r=>({date:r.date,mins:Math.round((r.secondsUsed||0)/60),zones:r.zonesDone||0}));if(Array.isArray(old.gym?.log))n.gym=old.gym.log.map(x=>({date:x.date,mode:x.mode||"Full",type:x.type||"Session"}));if(Array.isArray(old.bp?.log))n.health.bp=old.bp.log;if(Array.isArray(old.weight?.log))n.health.weight=old.weight.log;n.meta.legacyImported=true;return n}
function legacyImport(){let old;try{old=JSON.parse(localStorage.getItem("la_v1")||"null")}catch(e){}if(!old){toast("No previous data found here—use Restore backup instead.");return}if(!confirm("Copy your previous Life Admin data into the new app? The old data will remain untouched."))return;S=fromLegacy(old);save("Previous data copied into Life Admin.");closeModal();render()}
document.addEventListener("click",e=>{const b=e.target.closest("button,[data-action],[data-view]");if(!b)return;const a=b.dataset.action;if(b.dataset.view){UI.view=b.dataset.view;render();$("#main").focus();return}if(a==="go-today"){UI.view="today";render()}else if(a==="cycle-theme"){S.theme=S.theme==="system"?"light":S.theme==="light"?"dark":"system";save();applyTheme()}else if(a==="set-theme"){S.theme=b.dataset.theme;save("Theme changed.");applyTheme()}else if(a==="open-settings")settingsModal();else if(a==="close-modal")closeModal();else if(a==="close-drawer")closeDrawer();else if(a==="open-capture"||a==="add-event")captureModal();else if(a==="select-date"){UI.date=b.dataset.date;render()}else if(a==="plan-today"){UI.date=D.today();render()}else if(a==="task-filter"){UI.taskFilter=b.dataset.filter;render()}else if(a==="toggle-task"){const t=S.tasks.find(x=>x.id===b.dataset.id);if(t){t.status=t.status==="done"?"open":"done";t.done=t.status==="done"?D.today():null;if(t.status==="done")t.top=false;save(t.status==="done"?"Loop closed.":"Task reopened.");render()}}else if(a==="star-task"){const t=S.tasks.find(x=>x.id===b.dataset.id);if(t){if(!t.top&&S.tasks.filter(x=>x.top&&x.status==="open").length>=3){toast("Three priorities is enough.");return}t.top=!t.top;save();render()}}else if(a==="toggle-check"){const k=checkKey(b.dataset.date,b.dataset.key);S.checks[k]=!S.checks[k];save();render();if(UI.drawer)refreshDrawer(UI.drawer)}else if(a==="open-module")openDrawer(b.dataset.module);else if(a==="start-reset")startReset();else if(a==="timer-task"){UI.timer.done.has(b.dataset.key)?UI.timer.done.delete(b.dataset.key):UI.timer.done.add(b.dataset.key);renderTimer()}else if(a==="next-zone"){if(UI.timer.index<UI.timer.zones.length-1){UI.timer.index++;renderTimer()}else finishReset()}else if(a==="add-time"){UI.timer.left+=120;UI.timer.total+=120;renderTimer()}else if(a==="stop-reset")stopReset();else if(a==="gym-log"){S.gym.push({date:D.today(),mode:b.dataset.mode,type:["Push","Pull","Legs"][S.gym.length%3]});save("Training logged.");refreshDrawer("movement");render()}else if(a==="do-next"){const n=nextAction();toast("Start small: "+n.title)}else if(a==="legacy-import")legacyImport();else if(a==="export-new"){S.meta.lastBackup=D.today();save();download("life-admin-v3-"+D.today()+".json",JSON.stringify(S,null,2));toast("Backup downloaded.")}else if(a==="import-new")$("#import-file").click();else if(a==="reset-new"){if(confirm("Reset the new Life Admin app on this device? Your previous la_v1 data will remain untouched.")){localStorage.removeItem(KEY);S=clone(DEFAULT);save();closeModal();render();toast("Life Admin reset.")}}});
document.addEventListener("submit",e=>{e.preventDefault();if(e.target.id==="global-capture"||e.target.id==="task-capture"){const input=e.target.querySelector("input"),title=input.value.trim();if(!title)return;S.tasks.push({id:uid(),title,area:"Inbox",status:"open",top:false,created:D.today()});input.value="";save("Captured. It can wait here.");if(UI.view==="tasks")render()}else if(e.target.id==="event-form"){const f=new FormData(e.target),title=String(f.get("title")||"").trim();if(!title)return;S.events.push({id:uid(),title,date:String(f.get("date")),time:String(f.get("time")),note:String(f.get("note")||"")});save("Added to the plan.");closeModal();render()}else if(e.target.id==="health-form"){const f=new FormData(e.target),sys=Number(f.get("sys")),dia=Number(f.get("dia")),pulse=Number(f.get("pulse"))||null,kg=Number(f.get("kg"));if((sys&&!dia)||(!sys&&dia)){toast("Add both blood-pressure numbers.");return}if(sys&&(sys<50||sys>260||dia<30||dia>200)){toast("Check those blood-pressure numbers.");return}if(kg&&(kg<30||kg>250)){toast("Check that weight value.");return}if(!sys&&!dia&&!kg){toast("Add at least one reading.");return}if(sys)S.health.bp.push({date:D.today(),sys,dia,pulse});if(kg)S.health.weight.push({date:D.today(),kg:Math.round(kg*10)/10});save("Health reading saved.");refreshDrawer("health");render()}else if(e.target.id==="reflection-form"){const f=new FormData(e.target),text=String(f.get("text")||"").trim(),control=String(f.get("control")||"").trim();if(!text&&!control)return;S.reflections.push({date:D.today(),text,control});save("Reflection saved privately.");refreshDrawer("mind")}});
$("#import-file").addEventListener("change",async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());if(!data||!Array.isArray(data.tasks))throw 0;if(confirm("Replace this app’s data with the selected backup?")){S=data.settings?fromLegacy(data):merge(DEFAULT,data);save(data.settings?"Previous-app backup imported.":"Life Admin backup restored.");closeModal();render()}}catch(err){toast("That is not a recognised Life Admin backup.")}e.target.value=""});
document.addEventListener("keydown",e=>{if(e.key==="/"&&!/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)){e.preventDefault();$("#global-input").focus()}if(e.key==="Escape"){if(UI.timer)stopReset();else if($("#modal").classList.contains("show"))closeModal();else if(UI.drawer)closeDrawer()}if(e.key==="Tab"){const box=UI.timer?$("#focus-card"):$("#modal").classList.contains("show")?$("#modal"):UI.drawer?$("#drawer"):null;if(box){const f=$$("button:not([disabled]),input:not([disabled]),textarea:not([disabled]),select:not([disabled]),[tabindex]:not([tabindex='-1'])").filter(x=>box.contains(x));if(f.length){const first=f[0],last=f.at(-1);if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}}}}});
matchMedia("(prefers-color-scheme:dark)").addEventListener?.("change",()=>{if(S.theme==="system")applyTheme()});
render();
if("serviceWorker" in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>
